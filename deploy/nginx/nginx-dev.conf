events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Р СӣР С—РЎвҖҡР С‘Р СҳР С‘Р В·Р В°РЎвҖ Р С‘РЎРҸ Р С—РЎРӮР С•Р С‘Р В·Р РҶР С•Р Т‘Р С‘РЎвҖҡР ВөР В»РЎРҠР Р…Р С•РЎРғРЎвҖҡР С‘
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Р вҖҳРЎС“РЎвҖһР ВөРЎРӮР С‘Р В·Р В°РЎвҖ Р С‘РЎРҸ
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/json 
        application/javascript 
        application/xml 
        application/xml+rss 
        application/xhtml+xml 
        application/x-font-ttf 
        application/x-font-opentype 
        application/vnd.ms-fontobject 
        image/svg+xml 
        image/x-icon;

    # Security headers (Р ВұР ВөР В· HSTS Р Т‘Р В»РЎРҸ HTTP)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss:; media-src 'self'" always;

    # Р вҖәР С•Р С–Р С‘РЎРӮР С•Р РҶР В°Р Р…Р С‘Р Вө
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /dev/stdout detailed;
    error_log /dev/stderr warn;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
    limit_req_status 429;

    upstream bot_service {
        server bot_service:8000;
    }

    # HTTP РЎРғР ВөРЎРӮР РҶР ВөРЎРӮ (Р ВұР ВөР В· SSL)
    server {
        listen 80;
        server_name _;  # Р СҹРЎРӮР С‘Р Р…Р С‘Р СҳР В°Р ВөРЎвҖҡ Р В»РЎРӢР ВұР С•Р в„– Р Т‘Р С•Р СҳР ВөР Р…
        
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        location = /api/chat/status {
            access_log off;
            proxy_pass http://bot_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/tts/status {
            access_log off;
            proxy_pass http://bot_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/youtube/queue {
            access_log off;
            proxy_pass http://bot_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /index.html {
            root /usr/share/nginx/html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        }

        # Frontend
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://bot_service;
            
            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Р СһР В°Р в„–Р СҳР В°РЎС“РЎвҖҡРЎвҖ№
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Р вҖҳРЎС“РЎвҖһР ВөРЎРӮР С‘Р В·Р В°РЎвҖ Р С‘РЎРҸ
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Auth routes with stricter rate limiting
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://bot_service;
            
            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Р вҖҳР С•Р В»Р ВөР Вө Р С”Р С•РЎРӮР С•РЎвҖҡР С”Р С‘Р Вө РЎвҖҡР В°Р в„–Р СҳР В°РЎС“РЎвҖҡРЎвҖ№ Р Т‘Р В»РЎРҸ auth
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://bot_service;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Upload routes with file size limit
        location /api/voices/upload {
            limit_req zone=upload burst=3 nodelay;
            proxy_pass http://bot_service;
            
            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Р РҲР РҶР ВөР В»Р С‘РЎвҖЎР ВөР Р…Р Р…РЎвҖ№Р Вө РЎвҖҡР В°Р в„–Р СҳР В°РЎС“РЎвҖҡРЎвҖ№ Р Т‘Р В»РЎРҸ Р В·Р В°Р С–РЎРӮРЎС“Р В·Р С”Р С‘ РЎвҖһР В°Р в„–Р В»Р С•Р РҶ
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Р СӣРЎвҖҡР С”Р В»РЎРӢРЎвҖЎР В°Р ВөР Сҳ Р ВұРЎС“РЎвҖһР ВөРЎРӮР С‘Р В·Р В°РЎвҖ Р С‘РЎРӢ Р Т‘Р В»РЎРҸ Р ВұР С•Р В»РЎРҠРЎвӮ¬Р С‘РЎвҖҰ РЎвҖһР В°Р в„–Р В»Р С•Р РҶ
            proxy_request_buffering off;
        }

        location /audio/ {
            proxy_pass http://bot_service;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # WebSocket
        location /ws {
            proxy_pass http://bot_service;
            proxy_http_version 1.1;
            
            # WebSocket headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Р СһР В°Р в„–Р СҳР В°РЎС“РЎвҖҡРЎвҖ№ Р Т‘Р В»РЎРҸ WebSocket
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
        }
    }
}

