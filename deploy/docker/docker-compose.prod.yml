services:
  # Postgres database.
  postgres:
    image: postgres:15-alpine
    container_name: tts_postgres_prod
    profiles: ["core"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting.
  redis:
    image: redis:7-alpine
    container_name: tts_redis_prod
    profiles: ["core"]
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # TTS Service - speech generation.
  tts_service:
    image: ${F5_TTS_IMAGE:?F5_TTS_IMAGE must be pinned to a tested tag or digest}
    container_name: tts_tts_service_prod
    profiles: ["cloud-tts-real"]
    ports:
      - "127.0.0.1:8011:8011"
    environment:
      - F5_TTS_SERVICE_PORT=8011
      - F5_TTS_SERVICE_PUBLIC_BASE_URL=http://tts_service:8011
      - F5_TTS_SERVICE_API_KEYS=${F5_TTS_SERVICE_API_KEY:?F5_TTS_SERVICE_API_KEY is required}
      - F5_TTS_DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - F5_TTS_DATABASE_ECHO=false
      - F5_TTS_BASE_DIR=/app
      - F5_TTS_ENGINE_MODE=real
      - F5_TTS_ENABLE_PREWARM=true
      - F5_TTS_MAX_INPUT_TEXT_LENGTH=2000
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - HF_HOME=/app/f5_tts_cache
    volumes:
      - tts_audio:/app/audio
      - tts_logs:/app/logs
      - tts_backups:/app/backups
      - tts_cache:/app/f5_tts_cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  tts_gateway:
    image: ${TTS_GATEWAY_IMAGE:?TTS_GATEWAY_IMAGE must be pinned to a tested tag or digest}
    container_name: tts_gateway_prod
    profiles: ["cloud-tts-fake", "cloud-tts-real"]
    ports:
      - "127.0.0.1:8010:8010"
    environment:
      - TTS_GATEWAY_PORT=8010
      - TTS_GATEWAY_PUBLIC_BASE_URL=http://tts_gateway:8010
      - TTS_GATEWAY_API_KEYS=${TTS_GATEWAY_API_KEY:?TTS_GATEWAY_API_KEY is required}
      - TTS_GATEWAY_REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - TTS_GATEWAY_F5_URL=http://tts_service:8011
      - TTS_GATEWAY_F5_API_KEY=${F5_TTS_SERVICE_API_KEY:?F5_TTS_SERVICE_API_KEY is required}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  tts_service_fake:
    image: ${F5_TTS_IMAGE:?F5_TTS_IMAGE must be pinned to a tested tag or digest}
    container_name: tts_tts_service_fake_prod
    profiles: ["cloud-tts-fake"]
    ports:
      - "127.0.0.1:8011:8011"
    environment:
      - F5_TTS_SERVICE_PORT=8011
      - F5_TTS_SERVICE_PUBLIC_BASE_URL=http://tts_service:8011
      - F5_TTS_SERVICE_API_KEYS=${F5_TTS_SERVICE_API_KEY:?F5_TTS_SERVICE_API_KEY is required}
      - F5_TTS_DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - F5_TTS_DATABASE_ECHO=false
      - F5_TTS_BASE_DIR=/app
      - F5_TTS_ENGINE_MODE=fake
      - F5_TTS_ENABLE_PREWARM=false
      - F5_TTS_RUACCENT_ENABLED=false
      - F5_TTS_TRANSCRIBER_ENABLED=false
      - F5_TTS_MAX_INPUT_TEXT_LENGTH=2000
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - HF_HOME=/app/f5_tts_cache
    volumes:
      - tts_audio:/app/audio
      - tts_logs:/app/logs
      - tts_backups:/app/backups
      - tts_cache:/app/f5_tts_cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      default:
        aliases:
          - tts_service

  # Bot Service - main API.
  bot_service:
    image: ${BOT_SERVICE_IMAGE:?BOT_SERVICE_IMAGE must be pinned to a tested tag or digest}
    container_name: tts_bot_service_prod
    profiles: ["core"]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY is required}
      - ALGORITHM=HS256
      - TTS_INTERNAL_API_KEY=${TTS_INTERNAL_API_KEY:-}
      - INTERNAL_SERVICE_JWT_ENABLED=${INTERNAL_SERVICE_JWT_ENABLED:-true}
      - INTERNAL_SERVICE_JWT_ISSUER=${INTERNAL_SERVICE_JWT_ISSUER:-bot_service}
      - INTERNAL_SERVICE_JWT_AUDIENCE_TTS=${INTERNAL_SERVICE_JWT_AUDIENCE_TTS:-f5_tts}
      - INTERNAL_SERVICE_JWT_SECRET=${INTERNAL_SERVICE_JWT_SECRET:-}
      - INTERNAL_SERVICE_JWT_TTL_SECONDS=${INTERNAL_SERVICE_JWT_TTL_SECONDS:-120}
      - INTERNAL_SERVICE_MTLS_ENABLED=${INTERNAL_SERVICE_MTLS_ENABLED:-false}
      - INTERNAL_SERVICE_CA_CERT_PATH=${INTERNAL_SERVICE_CA_CERT_PATH:-}
      - INTERNAL_SERVICE_CLIENT_CERT_PATH=${INTERNAL_SERVICE_CLIENT_CERT_PATH:-}
      - INTERNAL_SERVICE_CLIENT_KEY_PATH=${INTERNAL_SERVICE_CLIENT_KEY_PATH:-}

      # URLs.
      - BACKEND_URL=${BACKEND_URL:?BACKEND_URL is required}
      - FRONTEND_URL=${FRONTEND_URL:?FRONTEND_URL is required}
      - TTS_GATEWAY_URL=${TTS_GATEWAY_URL:-http://tts_gateway:8010}
      - TTS_GATEWAY_API_KEY=${TTS_GATEWAY_API_KEY:?TTS_GATEWAY_API_KEY is required}
      - F5_TTS_SERVICE_URL=http://tts_service:8011
      - F5_TTS_SERVICE_API_KEY=${F5_TTS_SERVICE_API_KEY:?F5_TTS_SERVICE_API_KEY is required}

      # Redis.
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - RATE_LIMIT_ENABLED=true
      - MAX_REQUESTS_PER_MINUTE=60

      # Twitch.
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:-}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET:-}
      - TWITCH_REDIRECT_URI=${TWITCH_REDIRECT_URI:-}
      - TWITCH_BOT_REDIRECT_URI=${TWITCH_BOT_REDIRECT_URI:-}

      # VK.
      - VK_CLIENT_ID=${VK_CLIENT_ID:-}
      - VK_CLIENT_SECRET=${VK_CLIENT_SECRET:-}
      - VK_REDIRECT_URI=${VK_REDIRECT_URI:-}
      - VK_BOT_REDIRECT_URI=${VK_BOT_REDIRECT_URI:-}
      - VK_AUTH_BASE_URL=https://auth.live.vkvideo.ru/app/oauth2/authorize

      # YouTube.
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}

      # DonationAlerts.
      - DONATIONALERTS_CLIENT_ID=${DONATIONALERTS_CLIENT_ID:-}
      - DONATIONALERTS_CLIENT_SECRET=${DONATIONALERTS_CLIENT_SECRET:-}
      - DONATIONALERTS_REDIRECT_URI=${DONATIONALERTS_REDIRECT_URI:-}

      # Hugging Face.
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - HF_HOME=/app/f5_tts_cache

      # CORS.
      - CORS_ORIGINS=${CORS_ORIGINS:-}

      # Admin.
      - ADMIN_USERS=${ADMIN_USERS:-}

      # Security.
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_HTTPONLY=true
      - ENABLE_SECURITY_HEADERS=true

      # Logging.
      - ENABLE_JSON_LOGS=true
      - ENABLE_LOG_ROTATION=true
    volumes:
      - ../../bot_service/core/data:/app/core/data
      - ../../bot_service/logs:/app/logs
      - ../../bot_service/backups:/app/backups
      - bot_cache:/app/f5_tts_cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend - React UI.
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be pinned to a tested tag or digest}
    container_name: tts_frontend_prod
    profiles: ["core"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - bot_service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  tts_audio:
    driver: local
  tts_logs:
    driver: local
  tts_backups:
    driver: local
  tts_cache:
    driver: local
  bot_cache:
    driver: local
  nginx_cache:
    driver: local

networks:
  default:
    name: tts_network
    driver: bridge
