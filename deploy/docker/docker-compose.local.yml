services:
  redis:
    image: redis:7-alpine
    container_name: tts_redis_local
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-dev-password}
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    ports: !override
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis-dev-password} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: tts_postgres_local
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    environment: !override
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_data}
    ports: !override
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes: !override
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_data}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot_service:
    build:
      context: ../../bot_service
      dockerfile: Dockerfile.prod
    container_name: tts_bot_service_local
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    env_file:
      - path: ../../bot_service/.env
        required: false
    ports: !override
      - "${BOT_SERVICE_HOST_PORT:-8000}:8000"
    environment: !override
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app_data}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-2bD0gYfJwRo_-esxNUFDXL9uBeb5GsyhQOdE31jj4n4=}
      ALGORITHM: HS256
      BACKEND_URL: ${LOCAL_APP_ORIGIN:-http://localhost}
      FRONTEND_URL: ${LOCAL_APP_ORIGIN:-http://localhost}
      TTS_GATEWAY_URL: ${TTS_GATEWAY_URL:-http://tts_gateway:8010}
      TTS_GATEWAY_API_KEY: ${TTS_GATEWAY_API_KEY:-gateway-dev-key}
      F5_TTS_SERVICE_URL: ${F5_TTS_SERVICE_URL:-http://tts_service:8011}
      F5_TTS_SERVICE_API_KEY: ${F5_TTS_SERVICE_API_KEY:-f5-dev-key}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      ADMIN_USERS: ${ADMIN_USERS:-}
      VK_AUTH_BASE_URL: https://auth.live.vkvideo.ru/app/oauth2/authorize
      TWITCH_REDIRECT_URI: ${LOCAL_AUTH_ORIGIN:-http://localhost}/auth/twitch/callback
      TWITCH_BOT_REDIRECT_URI: ${LOCAL_AUTH_ORIGIN:-http://localhost}/auth/twitch/bot/callback
      VK_REDIRECT_URI: ${LOCAL_AUTH_ORIGIN:-http://localhost}/auth/vk/callback
      VK_BOT_REDIRECT_URI: ${LOCAL_AUTH_ORIGIN:-http://localhost}/auth/vk/bot/callback
      DONATIONALERTS_REDIRECT_URI: ${LOCAL_AUTH_ORIGIN:-http://localhost}/donationalerts/callback
      CORS_ORIGINS: ${LOCAL_APP_ORIGIN:-http://localhost},http://localhost:3000,http://localhost:5173
      RATE_LIMIT_LOGIN: 60/minute
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_HTTPONLY: "false"
      ENABLE_SECURITY_HEADERS: "false"
      ENABLE_JSON_LOGS: "false"
      ENABLE_LOG_ROTATION: "false"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  tts_gateway:
    profiles: ["cloud-tts-fake", "cloud-tts-real"]
    build:
      context: ../../../tts-gateway
      dockerfile: Dockerfile
    container_name: tts_gateway_local
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    ports: !override
      - "${TTS_GATEWAY_HOST_PORT:-8010}:8010"
    environment: !override
      TTS_GATEWAY_PORT: 8010
      TTS_GATEWAY_PUBLIC_BASE_URL: http://localhost:8010
      TTS_GATEWAY_API_KEYS: ${TTS_GATEWAY_API_KEY:-gateway-dev-key}
      TTS_GATEWAY_REDIS_URL: redis://:${REDIS_PASSWORD:-redis-dev-password}@redis:6379/0
      TTS_GATEWAY_RESULT_TIMEOUT_SEC: ${TTS_GATEWAY_RESULT_TIMEOUT_SEC:-180}
      TTS_GATEWAY_REQUEST_TIMEOUT_SEC: ${TTS_GATEWAY_REQUEST_TIMEOUT_SEC:-60}
      TTS_GATEWAY_F5_URL: http://tts_service:8011
      TTS_GATEWAY_F5_API_KEY: ${F5_TTS_SERVICE_API_KEY:-f5-dev-key}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  tts_service_fake:
    profiles: ["cloud-tts-fake"]
    build:
      context: ../../../f5-tts-service
      dockerfile: Dockerfile
    container_name: tts_tts_service_fake_local
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    ports: !override
      - "${F5_TTS_SERVICE_HOST_PORT:-8011}:8011"
    environment: !override
      F5_TTS_SERVICE_PORT: 8011
      F5_TTS_SERVICE_PUBLIC_BASE_URL: http://tts_service:8011
      F5_TTS_SERVICE_API_KEYS: ${F5_TTS_SERVICE_API_KEY:-f5-dev-key}
      F5_TTS_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app_data}
      F5_TTS_DATABASE_ECHO: "false"
      F5_TTS_BASE_DIR: /app
      F5_TTS_ENGINE_MODE: fake
      F5_TTS_ENABLE_PREWARM: "false"
      F5_TTS_RUACCENT_ENABLED: "false"
      F5_TTS_TRANSCRIBER_ENABLED: "false"
      F5_TTS_MAX_INPUT_TEXT_LENGTH: "2000"
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      HF_TOKEN: ${HUGGINGFACE_TOKEN:-}
      HF_HOME: /app/f5_tts_cache
    volumes: !override
      - tts_audio:/app/audio
      - tts_cache:/app/f5_tts_cache
      - tts_voices:/app/data/voices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      default:
        aliases:
          - tts_service

  tts_service:
    profiles: ["cloud-tts-real"]
    build:
      context: ../../../f5-tts-service
      dockerfile: Dockerfile
    container_name: tts_tts_service_local
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    ports: !override
      - "${F5_TTS_SERVICE_HOST_PORT:-8011}:8011"
    environment: !override
      F5_TTS_SERVICE_PORT: 8011
      F5_TTS_SERVICE_PUBLIC_BASE_URL: http://tts_service:8011
      F5_TTS_SERVICE_API_KEYS: ${F5_TTS_SERVICE_API_KEY:-f5-dev-key}
      F5_TTS_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-app_data}
      F5_TTS_DATABASE_ECHO: "false"
      F5_TTS_BASE_DIR: /app
      F5_TTS_ENGINE_MODE: ${F5_TTS_ENGINE_MODE:-real}
      F5_TTS_ENABLE_PREWARM: ${F5_TTS_ENABLE_PREWARM:-true}
      F5_TTS_RUACCENT_ENABLED: ${F5_TTS_RUACCENT_ENABLED:-true}
      F5_TTS_TRANSCRIBER_ENABLED: ${F5_TTS_TRANSCRIBER_ENABLED:-true}
      F5_TTS_MAX_INPUT_TEXT_LENGTH: "2000"
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      HF_TOKEN: ${HUGGINGFACE_TOKEN:-}
      HF_HOME: /app/f5_tts_cache
    gpus: all
    volumes: !override
      - tts_audio:/app/audio
      - tts_cache:/app/f5_tts_cache
      - tts_voices:/app/data/voices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_LOCAL_TTS_AGENT_URL: http://localhost:46321
        VITE_BOT_SERVICE_URL: http://localhost:8000
        VITE_BOT_SERVICE_WS_URL: ws://localhost:8000
    container_name: tts_frontend_local
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    ports: !override
      - "${FRONTEND_HOST_PORT:-80}:80"
    volumes: !override
      - ../../deploy/nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      bot_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  tts_audio:
    driver: local
  tts_cache:
    driver: local
  tts_voices:
    driver: local

networks:
  default:
    name: tts_network
    driver: bridge
