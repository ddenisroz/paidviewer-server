name: paidviewer

x-log-options: &bounded-logs
  driver: local
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  postgres:
    image: postgres:15-alpine
    container_name: paidviewer_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - ${PAIDVIEWER_DATA_DIR:-/srv/paidviewer}/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *bounded-logs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paidviewer_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - ${PAIDVIEWER_DATA_DIR:-/srv/paidviewer}/redis:/data
    restart: unless-stopped
    logging: *bounded-logs
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  bot_service:
    image: ${BOT_SERVICE_IMAGE:?BOT_SERVICE_IMAGE must be pinned to a tested tag}
    container_name: paidviewer_bot_service
    ports:
      - "${BOT_SERVICE_BIND_IP:-127.0.0.1}:${BOT_SERVICE_PORT:-8000}:8000"
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY is required}
      BACKEND_URL: ${BACKEND_URL:?BACKEND_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI:-}
      TWITCH_BOT_REDIRECT_URI: ${TWITCH_BOT_REDIRECT_URI:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI:-}
      VK_BOT_REDIRECT_URI: ${VK_BOT_REDIRECT_URI:-}
      VK_AUTH_BASE_URL: ${VK_AUTH_BASE_URL:-https://auth.live.vkvideo.ru/app/oauth2/authorize}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      DONATIONALERTS_CLIENT_ID: ${DONATIONALERTS_CLIENT_ID:-}
      DONATIONALERTS_CLIENT_SECRET: ${DONATIONALERTS_CLIENT_SECRET:-}
      DONATIONALERTS_REDIRECT_URI: ${DONATIONALERTS_REDIRECT_URI:-}
      DONATIONALERTS_WEBHOOK_SECRET: ${DONATIONALERTS_WEBHOOK_SECRET:-}
      ADMIN_USERS: ${ADMIN_USERS:-}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_HTTPONLY: "true"
      ENABLE_SECURITY_HEADERS: "true"
      ENABLE_JSON_LOGS: ${ENABLE_JSON_LOGS:-true}
      ENABLE_LOG_ROTATION: "true"
      LOG_FILE: /app/logs/bot_service.log
      LOG_FILE_LEVEL: ${LOG_FILE_LEVEL:-WARNING}
      LOG_FILE_MAX_BYTES: ${LOG_FILE_MAX_BYTES:-5242880}
      LOG_FILE_BACKUP_COUNT: ${LOG_FILE_BACKUP_COUNT:-5}
      SECURITY_LOG_MAX_BYTES: ${SECURITY_LOG_MAX_BYTES:-5242880}
      SECURITY_LOG_BACKUP_COUNT: ${SECURITY_LOG_BACKUP_COUNT:-5}
      WORKER_CONTROL_SELF_HOST_ENABLED: "true"
      WORKER_CONTROL_MANAGED_ENABLED: ${WORKER_CONTROL_MANAGED_ENABLED:-false}
      WORKER_AGENT_DEFAULT_F5_ENDPOINT_URL: ${WORKER_AGENT_DEFAULT_F5_ENDPOINT_URL:-http://127.0.0.1:8011}
    volumes:
      - ${PAIDVIEWER_DATA_DIR:-/srv/paidviewer}/uploads:/app/uploads
      - ${PAIDVIEWER_DATA_DIR:-/srv/paidviewer}/logs:/app/logs
      - ${PAIDVIEWER_DATA_DIR:-/srv/paidviewer}/backups:/app/backups
      - ${PAIDVIEWER_DATA_DIR:-/srv/paidviewer}/bot-data:/app/core/data
      - bot_cache:/app/f5_tts_cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *bounded-logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bot_cache:
    driver: local
